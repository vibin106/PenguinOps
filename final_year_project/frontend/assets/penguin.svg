<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Glowing background -->
  <circle cx="100" cy="100" r="80" fill="#0f111a" stroke="#00f0ff" stroke-width="4" filter="drop-shadow(0 0 10px #00f0ff)"/>
  
  <!-- Penguin Body -->
  <ellipse cx="100" cy="110" rx="45" ry="60" fill="#1e1e1e" />
  <ellipse cx="100" cy="120" rx="35" ry="45" fill="#f0f0f0" />
  
  <!-- Eyes -->
  <circle cx="85" cy="85" r="8" fill="#00f0ff" filter="drop-shadow(0 0 5px #00f0ff)" />
  <circle cx="115" cy="85" r="8" fill="#00f0ff" filter="drop-shadow(0 0 5px #00f0ff)" />
  
  <!-- Beak -->
  <path d="M 90 95 L 110 95 L 100 110 Z" fill="#ffaa00" />
  
  <!-- Headgear / Cyberpunk Glasses -->
  <path d="M 60 75 Q 100 90 140 75" stroke="#b026ff" stroke-width="4" fill="none" filter="drop-shadow(0 0 5px #b026ff)"/>
  
  <!-- Flippers -->
  <path d="M 55 110 Q 30 140 50 160" stroke="#1e1e1e" stroke-width="15" fill="none" stroke-linecap="round" />
  <path d="M 145 110 Q 170 140 150 160" stroke="#1e1e1e" stroke-width="15" fill="none" stroke-linecap="round" />

  <!-- Feet -->
  <ellipse cx="80" cy="175" rx="15" ry="8" fill="#ffaa00" />
  <ellipse cx="120" cy="175" rx="15" ry="8" fill="#ffaa00" />
</svg>
