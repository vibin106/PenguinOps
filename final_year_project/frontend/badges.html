<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Badges – PenguinOps</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link  rel="stylesheet" href="css/styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body>
<div class="app-container">

    <aside class="sidebar" id="sidebar"></aside>

    <main class="main-content page-fade">
        <div class="page-header">
            <div>
                <h1 class="page-title gradient-text">🏅 Achievement Vault</h1>
                <p class="page-subtitle">Earn XP, complete missions, and unlock badges</p>
            </div>
            <div style="display:flex;align-items:center;gap:10px">
                <span class="tag" id="earned-count">0 earned</span>
                <span class="tag" style="color:var(--text-muted)" id="locked-count">0 locked</span>
            </div>
        </div>

        <!-- Earned section -->
        <div style="margin-bottom:8px;font-size:.78rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted)">Earned</div>
        <div id="earned-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;margin-bottom:32px">
            <!-- populated by JS -->
        </div>

        <!-- Locked section -->
        <div style="margin-bottom:8px;font-size:.78rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted)">Locked — Keep grinding!</div>
        <div id="locked-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px">
            <!-- populated by JS -->
        </div>
    </main>
</div>

<div id="toast-container"></div>

<script type="module">
import { Auth, protectRoute, applyRoleUI } from './js/auth.js';
import { initSidebar, showToast } from './js/ui.js';
import { apiRequest }  from './js/api.js';

protectRoute();
applyRoleUI();

document.addEventListener('DOMContentLoaded', async () => {
    initSidebar('badges.html');

    // Badge definitions
    const allBadges = [
        { id:'first_mission',  icon:'🚀', name:'First Mission',    desc:'Complete your first project',         color:'#00f0ff', earned:true  },
        { id:'decathlon',      icon:'💯', name:'Decathlon',        desc:'Close 10 tasks in one week',          color:'#a855f7', earned:true  },
        { id:'xp_1000',        icon:'⚡', name:'Power Surge',      desc:'Reach 1000 XP total',                 color:'#ffe54c', earned:true  },
        { id:'team_player',    icon:'🤝', name:'Team Player',      desc:'Collaborate on 5 projects',           color:'#00ff9d', earned:false, progress:3, total:5  },
        { id:'streak_7',       icon:'🔥', name:'Streak Master',    desc:'Log in 7 days in a row',              color:'#ff7b00', earned:false, progress:4, total:7  },
        { id:'ai_pioneer',     icon:'🤖', name:'AI Pioneer',       desc:'Send 20 messages to PenguinAI',       color:'#a855f7', earned:false, progress:8, total:20 },
        { id:'top_3',          icon:'🏆', name:'Podium Finisher',  desc:'Reach top 3 on the leaderboard',      color:'#ffe54c', earned:false, progress:0, total:1  },
        { id:'speed_demon',    icon:'⚡', name:'Speed Demon',      desc:'Complete a task within 1 hour',       color:'#00f0ff', earned:false, progress:0, total:1  },
        { id:'centurion',      icon:'💎', name:'Centurion',        desc:'Complete 100 tasks total',            color:'#f059cc', earned:false, progress:42, total:100 },
    ];

    // Try to merge with backend skills
    try {
        const skillData = await apiRequest('/skills/me', 'GET');
        if (skillData?.skills?.length) {
            // Mark relevant earned badges
        }
    } catch {}

    const earnedBadges  = allBadges.filter(b => b.earned);
    const lockedBadges  = allBadges.filter(b => !b.earned);

    document.getElementById('earned-count').textContent = `${earnedBadges.length} earned`;
    document.getElementById('locked-count').textContent = `${lockedBadges.length} locked`;

    function buildCard(badge) {
        const div = document.createElement('div');
        div.className = 'badge-card';
        div.style.setProperty('--badge-color-a', badge.color + '22');
        div.style.setProperty('--badge-border',  badge.color + '55');
        div.style.setProperty('--badge-glow',    badge.color + '33');
        div.style.setProperty('--badge-bg',      badge.color + '11');
        div.style.setProperty('--badge-shadow',  badge.color + '33');
        if (!badge.earned) div.classList.add('locked');

        const progBar = badge.progress !== undefined ? `
            <div style="width:100%;margin-top:10px">
                <div style="display:flex;justify-content:space-between;font-size:.65rem;color:var(--text-muted);margin-bottom:4px">
                    <span>Progress</span><span>${badge.progress}/${badge.total}</span>
                </div>
                <div style="height:4px;background:rgba(255,255,255,0.06);border-radius:4px;overflow:hidden">
                    <div style="height:100%;width:${Math.round(badge.progress/badge.total*100)}%;background:${badge.color};border-radius:4px;box-shadow:0 0 8px ${badge.color}55;transition:width 1.5s ease"></div>
                </div>
            </div>` : '';

        div.innerHTML = `
            <div class="badge-icon-wrap">
                <span style="font-size:1.8rem">${badge.icon}</span>
            </div>
            <div style="font-weight:700;font-size:.88rem;margin-bottom:5px">${badge.name}</div>
            <div style="font-size:.75rem;color:var(--text-muted);line-height:1.4">${badge.desc}</div>
            ${progBar}
            ${badge.earned ? '<div style="margin-top:10px;font-size:.7rem;color:var(--neon-green);font-weight:700">✓ Earned</div>' : ''}
        `;
        return div;
    }

    const earnedGrid = document.getElementById('earned-grid');
    const lockedGrid = document.getElementById('locked-grid');

    earnedBadges.forEach(b => earnedGrid.appendChild(buildCard(b)));
    lockedBadges.forEach(b => lockedGrid.appendChild(buildCard(b)));

    // Animate Cards
    gsap.from('.badge-card:not(.locked)', {
        scale: 0.7, opacity: 0, rotation: -5, y: 30,
        stagger: 0.08, duration: 0.65, ease: 'back.out(1.7)', delay: 0.1
    });
    gsap.from('.badge-card.locked', {
        opacity: 0, y: 20, stagger: 0.05, duration: 0.5, ease: 'power2.out', delay: 0.5
    });
});
</script>
</body>
</html>
